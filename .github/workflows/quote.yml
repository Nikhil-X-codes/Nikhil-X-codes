name: Update Dev Quote

on:
  schedule:
    - cron: "0 6 * * *"   # Every day at 6 AM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-quote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Fetch Quote & Update README
        run: |
          QUOTE=$(curl -s "https://zenquotes.io/api/today" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)[0]
          print(data['q'] + ' — ' + data['a'])
          ")
          echo "Today's quote: $QUOTE"

          # URL-encode for badge
          ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote('''$QUOTE'''))")

          # Replace the quote badge line in README
          sed -i "s|https://img.shields.io/badge/Quote-.*|https://img.shields.io/badge/Quote-${ENCODED}-blue?style=for-the-badge\&labelColor=0d1117\"|" README.md

      - name: Commit updated README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || (git commit -m "chore: update daily dev quote" && git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }})
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
